<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f172a">
  <title>Browning Family Dashboard</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273548;
      --accent: #3b82f6;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --urgent: #ef4444;
      --warning: #f59e0b;
      --success: #10b981;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    .header {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      padding: 20px 16px 18px;
      padding-top: calc(20px + env(safe-area-inset-top));
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }

    .refresh-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .refresh-btn:active { background: rgba(255,255,255,0.2); }

    .header-subtitle { font-size: 13px; color: var(--text-muted); }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      background: var(--bg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--text-muted);
      padding: 7px 16px;
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

    .content {
      padding: 14px 16px 24px;
      max-width: 600px;
      margin: 0 auto;
    }

    .section-card {
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .section-header:active { background: rgba(255,255,255,0.03); }

    .section-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
    }

    .chevron {
      color: var(--text-muted);
      font-size: 11px;
      transition: transform 0.2s;
    }
    .section-card.open .chevron { transform: rotate(180deg); }

    .section-body {
      display: none;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .section-card.open .section-body { display: block; }

    .weather-card {
      background: linear-gradient(135deg, #1a3a5c 0%, #1e293b 100%);
    }

    .weather-summary {
      padding: 14px 16px 6px;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .item {
      padding: 11px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .item:last-child { border-bottom: none; }

    .item-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 6px;
      flex-shrink: 0;
    }
    .item-dot.urgent  { background: var(--urgent); }
    .item-dot.warning { background: var(--warning); }
    .item-dot.success { background: var(--success); }
    .item-dot.info    { background: var(--text-muted); }

    .item-content { flex: 1; min-width: 0; }

    .item-time {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }

    .item-text { font-size: 14px; line-height: 1.45; }

    .item-detail {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.35;
    }

    .item-link {
      display: inline-block;
      margin-top: 6px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .last-updated {
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0 12px;
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>🏠 Browning Family</h1>
    <button class="refresh-btn" onclick="loadDashboard()">↻</button>
  </div>
  <div class="header-subtitle" id="header-subtitle">Loading…</div>
</div>

<div class="tabs" id="tabs"></div>

<div class="content" id="content">
  <div class="loading"><div class="spinner"></div><div>Loading your briefing…</div></div>
</div>

<script>
const SUPABASE_URL = 'https://qhvzfgsfkqrnykgryvej.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFodnpmZ3Nma3FybnlrZ3J5dmVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMzk1NjIsImV4cCI6MjA5NTgxNTU2Mn0.WbXMQaEfaewGarq7W4-hgp74OQuQtwpDNpxSzc-jNA4';

const TYPE_LABELS = { daily: '☀️ Daily', weekly: '📅 Weekly', weekend: '🎉 Weekend', monthly: '📆 Monthly' };

let allBriefings = [];
let currentType = 'daily';

async function fetchBriefings() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/briefings?order=date.desc,created_at.desc&limit=20&select=*`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  if (!res.ok) throw new Error('Fetch failed');
  return res.json();
}

function renderTabs(briefings) {
  const seen = new Set();
  const types = briefings.map(b => b.type).filter(t => { if (seen.has(t)) return false; seen.add(t); return true; });
  document.getElementById('tabs').innerHTML = types.map(t => `
    <button class="tab ${t === currentType ? 'active' : ''}" onclick="switchType('${t}')">
      ${TYPE_LABELS[t] || t}
    </button>
  `).join('');
}

function switchType(type) {
  currentType = type;
  renderTabs(allBriefings);
  const briefing = allBriefings.find(b => b.type === type);
  if (briefing) renderBriefing(briefing);
}

function dotClass(type) {
  return { urgent: 'urgent', action: 'warning', success: 'success', info: 'info' }[type] || '';
}

function renderItem(item) {
  return `
    <div class="item">
      <div class="item-dot ${dotClass(item.type)}"></div>
      <div class="item-content">
        ${item.time   ? `<div class="item-time">${item.time}</div>` : ''}
        <div class="item-text">${item.text}</div>
        ${item.detail ? `<div class="item-detail">${item.detail}</div>` : ''}
        ${item.link   ? `<a class="item-link" href="${item.link}" target="_blank">↗ ${item.link_label || 'Open link'}</a>` : ''}
      </div>
    </div>`;
}

function renderSection(section, i) {
  const open = section.collapsed === false || section.collapsed === undefined ? 'open' : '';
  const extra = section.id === 'weather' ? ' weather-card' : '';
  return `
    <div class="section-card ${open}${extra}" id="sec-${i}">
      <div class="section-header" onclick="toggle(${i})">
        <div class="section-title"><span>${section.emoji || '•'}</span><span>${section.title}</span></div>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        ${section.weather_summary ? `<div class="weather-summary">${section.weather_summary}</div>` : ''}
        ${(section.items || []).map(renderItem).join('')}
      </div>
    </div>`;
}

function toggle(i) {
  document.getElementById(`sec-${i}`).classList.toggle('open');
}

function renderBriefing(b) {
  const c = b.content;
  document.getElementById('header-subtitle').textContent = c.subtitle || b.date;
  document.getElementById('content').innerHTML =
    `<div class="last-updated">Updated ${new Date(b.created_at).toLocaleString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' })}</div>` +
    (c.sections || []).map((s, i) => renderSection(s, i)).join('');
}

async function loadDashboard() {
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div><div>Loading…</div></div>`;
  try {
    allBriefings = await fetchBriefings();
    if (!allBriefings.length) {
      document.getElementById('header-subtitle').textContent = 'No briefings yet';
      document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>No briefings yet.<br>Your first one will appear here.</div></div>`;
      document.getElementById('tabs').innerHTML = '';
      return;
    }
    const daily = allBriefings.find(b => b.type === 'daily');
    currentType = daily ? 'daily' : allBriefings[0].type;
    renderTabs(allBriefings);
    renderBriefing(allBriefings.find(b => b.type === currentType));
  } catch (e) {
    document.getElementById('header-subtitle').textContent = 'Error loading data';
    document.getElementById('content').innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><div>Could not load briefing.<br>Tap ↻ to retry.</div></div>`;
  }
}

loadDashboard();
</script>
</body>
</html>
